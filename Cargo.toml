[package]
name = "radrootsd"
version = "0.1.0"
edition = "2024"
authors = ["Radroots Authors"]
rust-version = "1.88.0"
license = "AGPL-3.0-or-later"
description = "Radroots local runtime daemon for storage, sync, and relay publishing"

[dependencies]
radroots-core = { path = "../../../../vendor/radroots/rs/crates/core", features = ["std", "serde", "typeshare"]  }
radroots-events = { path = "../../../../vendor/radroots/rs/crates/events", features = ["serde"] }
radroots-events-codec = { path = "../../../../vendor/radroots/rs/crates/events-codec", features = ["nostr", "serde_json"] }
radroots-identity = { path = "../../../../vendor/radroots/rs/crates/identity" }
radroots-nostr = { path = "../../../../vendor/radroots/rs/crates/nostr", features = ["client", "codec", "events", "http"] }
radroots-runtime = { path = "../../../../vendor/radroots/rs/crates/runtime", features = ["cli"] }
radroots-trade = { path = "../../../../vendor/radroots/rs/crates/trade" }
nostr = { version = "0.44.2", features = ["nip46"] }

anyhow = { version = "1" }
clap = { version = "4", features = ["derive"] }
jsonrpsee = { version = "0.26", features = ["server"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1", default-features = false }
serde_qs = { version = "0.12" }
tokio = { version = "1", features = ["full"] }
thiserror = { version = "1" }
tracing = { version = "0.1" }
uuid = { version = "1.16.0", features = ["v4"] }
url = { version = "2.5.4" }
