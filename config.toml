# canonical service-host sample:
#   copy to /etc/radroots/services/radrootsd/config.toml
#   launch with RADROOTSD_PATHS_PROFILE=service_host
# manual operator runs may instead place the same file at:
#   ~/.radroots/config/services/radrootsd/config.toml
# repo-owned local runs should prefer the root .env.local control plane, which derives
# RADROOTSD_PATHS_PROFILE=repo_local and RADROOTSD_PATHS_REPO_LOCAL_ROOT automatically
# when path-like values are omitted, the active profile derives:
#   interactive_user:
#     logs_dir = ~/.radroots/logs/services/radrootsd
#     service identity = ~/.radroots/secrets/services/radrootsd/identity.secret.json
#     publish proxy database = ~/.radroots/data/services/radrootsd/publish_proxy.sqlite
#   service_host:
#     logs_dir = /var/log/radroots/services/radrootsd
#     service identity = /etc/radroots/secrets/services/radrootsd/identity.secret.json
#     publish proxy database = /var/lib/radroots/services/radrootsd/publish_proxy.sqlite
# the canonical live service identity is always an encrypted local envelope
# only override logs_dir or config.publish_proxy.database_path intentionally

[metadata]
name = "radrootsd"
# display_name = ""
# about = ""
# picture = ""
# banner = ""
# banner = ""
# nip05 = ""
# lud06 = ""
# lud16 = ""

[config]
relays = [
  "ws://127.0.0.1:8080"
]

[config.rpc]
addr = "127.0.0.1:7070"

[config.publish_proxy]
enabled = true
max_event_bytes = 131072
max_relays_per_request = 20
job_list_limit = 100
max_concurrent_publish_jobs = 8
relay_url_policy = "localhost"
author_relay_discovery_relays = []
daemon_default_publish_relays = ["ws://127.0.0.1:8080"]

[config.nip46]
public_jsonrpc_enabled = false
session_ttl_secs = 900
perms = []
