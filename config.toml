# canonical service-host sample:
#   copy to /etc/radroots/services/radrootsd/config.toml
#   launch with RADROOTSD_PATHS_PROFILE=service_host
# manual operator runs may instead place the same file at:
#   ~/.radroots/config/services/radrootsd/config.toml

[metadata]
name = "radrootsd"
# display_name = ""
# about = ""
# picture = ""
# banner = ""
# banner = ""
# nip05 = ""
# lud06 = ""
# lud16 = ""

[config]
relays = [
  "ws://127.0.0.1:8080"
]

[config.rpc]
addr = "127.0.0.1:7070"

[config.bridge]
enabled = true
bearer_token = "change-me"
delivery_policy = "any"
publish_max_attempts = 2

[config.nip46]
public_jsonrpc_enabled = false
session_ttl_secs = 900
perms = []
